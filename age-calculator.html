<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Calculator - CalcMaster</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fb;
margin:0;
padding:20px;
}

.container{
max-width:450px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h1{
text-align:center;
color:#2563eb;
}

input{
width:100%;
padding:12px;
font-size:18px;
margin-top:15px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:20px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.result{
margin-top:20px;
text-align:center;
font-size:22px;
font-weight:bold;
color:#111827;
}

a{
display:block;
margin-top:20px;
text-align:center;
text-decoration:none;
color:#2563eb;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h1>Age Calculator</h1>

<label>Select Your Date of Birth</label>

<input type="date" id="dob">

<button onclick="calculateAge()">Calculate Age</button>

<div class="result" id="result"></div>

<a href="index.html">⬅ Back to Home</a>

</div>

<script>

function calculateAge(){

let dob=document.getElementById("dob").value;

if(dob==""){
alert("Please select your birth date");
return;
}

let birth=new Date(dob);
let today=new Date();

let years=today.getFullYear()-birth.getFullYear();
let months=today.getMonth()-birth.getMonth();
let days=today.getDate()-birth.getDate();

if(days<0){
months--;
}

if(months<0){
years--;
months+=12;
}

document.getElementById("result").innerHTML=
"Your Age is <br><br>"+years+" Years "+months+" Months";

}

</script>

</body>
</html>
