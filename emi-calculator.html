<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMI Calculator - CalcMaster</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
margin:0;
}
header{
background:#2563eb;
color:white;
text-align:center;
padding:20px;
}
.container{
max-width:400px;
margin:30px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,.2);
}
label{
font-weight:bold;
}
input{
width:100%;
padding:12px;
margin:10px 0 20px;
font-size:18px;
}
button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}
button:hover{
background:#1d4ed8;
}
#result{
margin-top:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}
</style>

</head>
<body>

<header>
<h1>EMI Calculator</h1>
<p>Monthly Loan EMI Calculator</p>
</header>

<div class="container">

<label>Loan Amount</label>
<input type="number" id="loan">

<label>Annual Interest Rate (%)</label>
<input type="number" id="rate">

<label>Loan Period (Years)</label>
<input type="number" id="years">

<button onclick="calculateEMI()">Calculate EMI</button>

<div id="result"></div>

</div>

<script>

function calculateEMI(){

let P=parseFloat(document.getElementById("loan").value);
let annual=parseFloat(document.getElementById("rate").value);
let years=parseFloat(document.getElementById("years").value);

if(isNaN(P)||isNaN(annual)||isNaN(years)){
document.getElementById("result").innerHTML="Please enter all values.";
return;
}

let r=annual/12/100;
let n=years*12;

let emi=(P*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);

document.getElementById("result").innerHTML=
"Monthly EMI<br><span style='color:#2563eb;'>$"+emi.toFixed(2)+"</span>";

}

</script>

</body>
</html>
