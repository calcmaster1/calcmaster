<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discount Calculator - CalcMaster</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
margin:0;
}
header{
background:#2563eb;
color:white;
padding:20px;
text-align:center;
}
.container{
max-width:400px;
margin:30px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,.2);
}
input{
width:100%;
padding:12px;
margin:10px 0;
font-size:18px;
}
button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}
#result{
margin-top:20px;
text-align:center;
font-size:20px;
font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>Discount Calculator</h1>
</header>

<div class="container">

<label>Original Price</label>
<input type="number" id="price">

<label>Discount (%)</label>
<input type="number" id="discount">

<button onclick="calculateDiscount()">Calculate</button>

<div id="result"></div>

</div>

<script>
function calculateDiscount(){

let price=parseFloat(document.getElementById("price").value);
let discount=parseFloat(document.getElementById("discount").value);

if(isNaN(price)||isNaN(discount)){
document.getElementById("result").innerHTML="Please enter valid values.";
return;
}

let save=(price*discount)/100;
let finalPrice=price-save;

document.getElementById("result").innerHTML=
"Discount Amount: $"+save.toFixed(2)+"<br><br>"+
"Final Price: $"+finalPrice.toFixed(2);

}
</script>

</body>
</html>
