<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Percentage Calculator - CalcMaster</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
margin:0;
}
header{
background:#2563eb;
color:white;
text-align:center;
padding:20px;
}
.container{
max-width:400px;
margin:30px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,.2);
}
input{
width:100%;
padding:12px;
margin:10px 0;
font-size:18px;
}
button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}
#result{
margin-top:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}
</style>

</head>

<body>

<header>
<h1>Percentage Calculator</h1>
</header>

<div class="container">

<label>Value</label>
<input type="number" id="value">

<label>Total</label>
<input type="number" id="total">

<button onclick="calculatePercentage()">Calculate</button>

<div id="result"></div>

</div>

<script>
function calculatePercentage(){

let value=parseFloat(document.getElementById("value").value);
let total=parseFloat(document.getElementById("total").value);

if(!value||!total){
document.getElementById("result").innerHTML="Please enter both values.";
return;
}

let percent=((value/total)*100).toFixed(2);

document.getElementById("result").innerHTML=value+" is "+percent+"% of "+total;

}
</script>

</body>
</html>
