<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Converter - CalcMaster</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
width:320px;
text-align:center;
}

h2{
margin-bottom:20px;
color:#2563eb;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:#fff;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

#result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
<h2>Currency Converter</h2>

<input type="number" id="amount" placeholder="Enter Amount">

<select id="from">
<option value="USD">USD</option>
<option value="EUR">EUR</option>
<option value="GBP">GBP</option>
<option value="LKR">LKR</option>
<option value="INR">INR</option>
</select>

<select id="to">
<option value="LKR">LKR</option>
<option value="USD">USD</option>
<option value="EUR">EUR</option>
<option value="GBP">GBP</option>
<option value="INR">INR</option>
</select>

<button onclick="convert()">Convert</button>

<div id="result"></div>

</div>

<script>
async function convert(){

let amount=document.getElementById("amount").value;
let from=document.getElementById("from").value;
let to=document.getElementById("to").value;

if(amount==""){
alert("Enter amount");
return;
}

let url=`https://api.exchangerate-api.com/v4/latest/${from}`;

let data=await fetch(url);
let result=await data.json();

let rate=result.rates[to];
let total=(amount*rate).toFixed(2);

document.getElementById("result").innerHTML=
amount+" "+from+" = "+total+" "+to;

}
</script>

</body>
</html>
