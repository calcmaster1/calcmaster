<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalcMaster - Free Online Calculator Tools</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#2563eb;
color:white;
padding:20px;
text-align:center;
}

.search{
padding:20px;
text-align:center;
}

.search input{
width:90%;
max-width:500px;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.1);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card a{
text-decoration:none;
color:#2563eb;
font-weight:bold;
}

footer{
text-align:center;
padding:20px;
color:#666;
}
</style>

</head>
<body>

<header>
<h1>CalcMaster</h1>
<p>Free Online Calculator Tools</p>
</header>

<div class="search">
<input type="text" placeholder="Search Calculator...">
</div>

<div class="grid">

<div class="card">
<h3>Age Calculator</h3>
<a href="#">Open</a>
</div>

<div class="card">
<h3>BMI Calculator</h3>
<a href="#">Open</a>
</div>

<div class="card">
<h3>Percentage Calculator</h3>
<a href="#">Open</a>
</div>

<div class="card">
<h3>Discount Calculator</h3>
<a href="#">Open</a>
</div>

<div class="card">
<h3>Loan EMI Calculator</h3>
<a href="#">Open</a>
</div>

<div class="card">
<h3>Date Calculator</h3>
<a href="#">Open</a>
</div>

</div>

<footer>
© 2026 CalcMaster. All Rights Reserved.
</footer>

</body>
</html>
