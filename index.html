<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalcMaster - Free Online Calculator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fb;
}

header{
background:#2563eb;
color:white;
padding:25px;
text-align:center;
}

header h1{
font-size:38px;
}

header p{
margin-top:10px;
}

.search{
padding:20px;
text-align:center;
}

.search input{
width:90%;
max-width:500px;
padding:14px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
margin-bottom:15px;
}

.card a{
display:inline-block;
background:#2563eb;
color:white;
padding:10px 18px;
border-radius:8px;
text-decoration:none;
}

footer{
margin-top:40px;
padding:25px;
text-align:center;
background:#222;
color:white;
}
</style>

</head>

<body>

<header>
<h1>CalcMaster</h1>
<p>Free Online Calculator Tools</p>
</header>

<div class="search">
<input type="text" placeholder="Search calculator...">
</div>

<div class="grid">

<div class="card">
<h3>Age Calculator</h3>
<a href="#">Open</a>
</div>

<div class="card">
<h3>BMI Calculator</h3>
<a href="#">Open</a>
</div>

<div class="card">
<h3>Percentage Calculator</h3>
<a href="#">Open</a>
</div>

<div class="card">
<h3>Discount Calculator</h3>
<a href="#">Open</a>
</div>

<div class="card">
<h3>EMI Calculator</h3>
<a href="#">Open</a>
</div>

<div class="card">
<h3>Loan Calculator</h3>
<a href="#">Open</a>
</div>

<div class="card">
<h3>GST / VAT Calculator</h3>
<a href="#">Open</a>
</div>

<div class="card">
<h3>Date Calculator</h3>
<a href="#">Open</a>
</div>

</div>

<footer>
© 2026 CalcMaster | Free Online Calculator Website
</footer>

</body>
</html>
