<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator - CalcMaster</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
}
header{
background:#2563eb;
color:#fff;
text-align:center;
padding:20px;
}
.container{
max-width:400px;
margin:30px auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,.2);
}
input{
width:100%;
padding:12px;
margin:10px 0;
font-size:18px;
}
button{
width:100%;
padding:14px;
background:#2563eb;
color:#fff;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}
#result{
margin-top:20px;
font-size:22px;
text-align:center;
font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>BMI Calculator</h1>
</header>

<div class="container">

<label>Weight (kg)</label>
<input type="number" id="weight">

<label>Height (cm)</label>
<input type="number" id="height">

<button onclick="calcBMI()">Calculate BMI</button>

<div id="result"></div>

</div>

<script>

function calcBMI(){

let w=parseFloat(document.getElementById("weight").value);
let h=parseFloat(document.getElementById("height").value)/100;

if(!w||!h){
document.getElementById("result").innerHTML="Please enter all values.";
return;
}

let bmi=(w/(h*h)).toFixed(1);

let status="";

if(bmi<18.5) status="Underweight";
else if(bmi<25) status="Normal";
else if(bmi<30) status="Overweight";
else status="Obese";

document.getElementById("result").innerHTML="BMI: "+bmi+"<br>"+status;

}

</script>

</body>
</html>
