<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Calculator - CalcMaster</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
margin:0;
}
header{
background:#2563eb;
color:white;
text-align:center;
padding:20px;
}
.container{
max-width:420px;
margin:30px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,.2);
}
input{
width:100%;
padding:12px;
margin:10px 0;
font-size:18px;
}
button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}
#result{
margin-top:20px;
font-size:20px;
font-weight:bold;
text-align:center;
}
</style>

</head>

<body>

<header>
<h1>Loan Calculator</h1>
<p>Calculate Total Loan Repayment</p>
</header>

<div class="container">

<label>Loan Amount</label>
<input type="number" id="loan">

<label>Interest Rate (%)</label>
<input type="number" id="rate">

<label>Years</label>
<input type="number" id="years">

<button onclick="calculateLoan()">Calculate</button>

<div id="result"></div>

</div>

<script>

function calculateLoan(){

let loan=parseFloat(document.getElementById("loan").value);
let rate=parseFloat(document.getElementById("rate").value);
let years=parseFloat(document.getElementById("years").value);

if(isNaN(loan)||isNaN(rate)||isNaN(years)){
document.getElementById("result").innerHTML="Please enter all values.";
return;
}

let interest=loan*rate*years/100;
let total=loan+interest;

document.getElementById("result").innerHTML=
"Interest: $"+interest.toFixed(2)+"<br><br>Total Repayment: $"+total.toFixed(2);

}

</script>

</body>
</html>
